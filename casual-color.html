    <div class="lightbox" id="gallery-lightbox" aria-hidden="true" role="dialog" aria-label="Expanded image">
      <button class="lightbox-close" type="button" aria-label="Close image">&times;</button>
      <button class="lightbox-arrow lightbox-prev" type="button" aria-label="Previous image">&lt;</button>
      <img src="" alt="" draggable="false" />
      <button class="lightbox-arrow lightbox-next" type="button" aria-label="Next image">&gt;</button>
    </div>

    <script>
      const galleryImages = Array.from(document.querySelectorAll('.gallery-card img'));
      const lightbox = document.querySelector('#gallery-lightbox');
      const lightboxImage = lightbox.querySelector('img');
      const closeButton = lightbox.querySelector('.lightbox-close');
      const previousButton = lightbox.querySelector('.lightbox-prev');
      const nextButton = lightbox.querySelector('.lightbox-next');
      let activeIndex = 0;

      function showImage(index) {
        activeIndex = (index + galleryImages.length) % galleryImages.length;
        const image = galleryImages[activeIndex];
        lightboxImage.src = image.src;
        lightboxImage.alt = image.alt;
      }

      function openLightbox(index) {
        showImage(index);
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        closeButton.focus();
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        lightboxImage.src = '';
      }

      galleryImages.forEach((image, index) => {
        image.addEventListener('click', () => openLightbox(index));
        image.addEventListener('contextmenu', (event) => event.preventDefault());
        image.addEventListener('dragstart', (event) => event.preventDefault());
      });

      closeButton.addEventListener('click', closeLightbox);
      previousButton.addEventListener('click', () => showImage(activeIndex - 1));
      nextButton.addEventListener('click', () => showImage(activeIndex + 1));
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', (event) => {
        if (!lightbox.classList.contains('open')) return;
        if (event.key === 'Escape') closeLightbox();
        if (event.key === 'ArrowLeft') showImage(activeIndex - 1);
        if (event.key === 'ArrowRight') showImage(activeIndex + 1);
      });
    </script>

  </body>
</html>
