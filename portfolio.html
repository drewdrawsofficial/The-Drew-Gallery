      const categoryNav = document.querySelector('#portfolio-categories');
      const portfolioRoot = document.querySelector('#portfolio-root');

      function node(tag, className, text) {
        const element = document.createElement(tag);
        if (className) element.className = className;
        if (text) element.textContent = text;
        return element;
      }

      portfolioCategories.forEach((category) => {
        const link = node('a', '', category.label);
        link.href = `#${category.id}`;
        categoryNav.append(link);

        const section = node('section', 'portfolio-section');
        section.id = category.id;
        section.setAttribute('aria-labelledby', `${category.id}-heading`);

        const heading = node('div', 'section-heading');
        const headingText = node('div');
        headingText.append(node('p', 'section-kicker', category.kicker));
        const title = node('h2', '', category.label);
        title.id = `${category.id}-heading`;
        headingText.append(title);
        const back = node('a', 'section-link', 'Categories');
        back.href = '#portfolio-categories';
        heading.append(headingText, back);

        const grid = node('div', 'gallery-grid');
        category.items.forEach((item) => {
          const card = node('article', 'art-card gallery-card');
          const image = document.createElement('img');
          image.src = item.src;
          image.alt = `${category.label} portfolio image`;
          image.loading = 'lazy';
          card.append(image);
          grid.append(card);
        });

        section.append(heading, grid);
        portfolioRoot.append(section);
      });
